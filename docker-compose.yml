version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: scanpy-postgres
    environment:
      # SECURITY NOTE: Development credentials only
      # Override these in production using environment variables or .env file
      POSTGRES_USER: ${POSTGRES_USER:-scanpy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scanpy_pass}
      POSTGRES_DB: ${POSTGRES_DB:-scanpy_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scanpy_user} -d ${POSTGRES_DB:-scanpy_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: scanpy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local